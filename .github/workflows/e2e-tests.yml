name: E2E Functional Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-testing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install selenium openpyxl

    - name: Seed Database
      run: |
        cd backend
        python seed.py

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Run Servers and E2E Tests
      run: |
        # Start backend FastAPI server in background
        cd backend
        python -m uvicorn main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
        cd ..
        
        # Start frontend Next.js server in background on 127.0.0.1
        cd frontend
        npm run dev -- -H 127.0.0.1 > frontend.log 2>&1 &
        cd ..
        
        # Wait for both servers to become responsive using Python script
        echo "Waiting for servers to start..."
        if ! python backend/wait_on.py; then
          echo "=== BACKEND LOGS ==="
          cat backend/backend.log
          echo "=== FRONTEND LOGS ==="
          cat frontend/frontend.log
          exit 1
        fi
        
        # Run selenium E2E tests
        python backend/test_selenium.py

    - name: Upload Excel Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: E2E_Test_Report_TutorNow
        path: E2E_Test_Report_TutorNow.xlsx
        if-no-files-found: error

    - name: Upload Debug Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Server_Debug_Logs
        path: |
          backend/backend.log
          frontend/frontend.log
        if-no-files-found: ignore
