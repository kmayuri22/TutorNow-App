services:
  - type: web
    name: tutornow-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_URL
        fromDatabase:
          name: tutornow-db
          property: connectionString
    autoDeploy: true

databases:
  - name: tutornow-db
    databaseName: tutornow
    user: tutornow_user
    plan: free
    region: oregon
