name: E2E Functional Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-testing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install selenium openpyxl

    - name: Seed Database
      run: |
        cd backend
        python seed.py

    - name: Start FastAPI Backend Server
      run: |
        cd backend
        python -m uvicorn main:app --port 8000 &
        echo "Backend server started in background."

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Start Next.js Frontend Server
      run: |
        cd frontend
        npm run dev &
        echo "Frontend dev server started in background."

    - name: Wait for Servers to be Responsive
      run: |
        npx wait-on http://localhost:8000 http://localhost:3000 --timeout 60000
        echo "Both servers are live and responsive!"

    - name: Run E2E Selenium Tests & Generate Excel Report
      run: |
        python backend/test_selenium.py
        echo "E2E Tests execution completed."

    - name: Upload Excel Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: E2E_Test_Report_TutorNow
        path: E2E_Test_Report_TutorNow.xlsx
        if-no-files-found: error
